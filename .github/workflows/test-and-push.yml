name: Test and Push to Main

on:
  push:
    branches:
      - source

jobs:
  test-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: tests
        continue-on-error: true
        run: npm test

      - name: Push to main (only if tests passed)
        if: steps.tests.outcome == 'success'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main || true
          git checkout main || git checkout --orphan main
          
          # Копируем ВСЁ из source, КРОМЕ папки src
          git checkout source -- README.md package.json package-lock.json tests/ .github/
          
          # Создаём пустую папку src (чтобы структура была видна)
          mkdir -p src
          touch src/.gitkeep
          
          git add .
          git commit -m "Автоматический пуш из source (тесты пройдены) [skip ci]" || echo "Нет изменений"
          git push --force origin main
